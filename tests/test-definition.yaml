---
dimensions:
  - name: hbase
    values:
      - 2.4.8-stackable0.0.0-dev
      - 2.4.9-stackable0.0.0-dev
      - 2.4.11-stackable0.0.0-dev
      - 2.4.12-stackable0.0.0-dev
  - name: hbase-latest
    values:
      - 2.4.12-stackable0.0.0-dev
  - name: hdfs
    values:
      - 3.2.2-stackable0.0.0-dev
      - 3.3.3-stackable0.0.0-dev
  - name: hdfs-latest
    values:
      - 3.3.4-stackable0.0.0-dev
  - name: zookeeper
    values:
      - 3.6.3-stackable0.0.0-dev
      - 3.7.0-stackable0.0.0-dev
      - 3.8.0-stackable0.0.0-dev
  - name: zookeeper-latest
    values:
      - 3.8.0-stackable0.0.0-dev
  # Used for zookeeper, hdfs and hbase
  - name: listener-class
    values:
      - "cluster-internal"
      - "external-unstable"
  - name: kerberos-realm
    values:
      - "CLUSTER.LOCAL"
      # - "PROD.MYCORP"
  - name: kerberos-backend
    values:
      - mit
      # Requires manual setup, see create-kerberos-secretclass.yaml
      # This will *not* respect the kerberos-realm test attribute, but instead use a hard-coded realm
      # - activeDirectory
tests:
  - name: smoke
    dimensions:
      - hbase
      - zookeeper
      - hdfs
      - listener-class
  - name: kerberos
    dimensions:
      - hbase
      - hdfs
      - zookeeper-latest
      - listener-class
      - kerberos-realm
      - kerberos-backend
  - name: orphaned_resources
    dimensions:
      - hbase-latest
      - hdfs-latest
      - zookeeper-latest
  - name: resources
    dimensions:
      - hbase-latest
      - hdfs-latest
      - zookeeper-latest
  - name: logging
    dimensions:
      - hbase
      - hdfs-latest
      - zookeeper-latest
  - name: cluster-operation
    dimensions:
      - hbase-latest
      - hdfs-latest
      - zookeeper-latest
